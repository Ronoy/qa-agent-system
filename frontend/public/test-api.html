<!DOCTYPE html>
<html>
<head>
  <title>知识库 API 集成测试</title>
  <script>
    // 测试 Token 获取
    function testTokenRetrieval() {
      const cookies = document.cookie.split(';');
      let token = '';
      for (const cookie of cookies) {
        const [name, value] = cookie.trim().split('=');
        if (name === 'token' || name === 'Authorization') {
          token = value;
          break;
        }
      }
      console.log('Token found:', token ? 'Yes' : 'No');
      return token;
    }

    // 测试 API 调用
    async function testKnowledgeBaseAPI() {
      const token = testTokenRetrieval();

      console.log('Testing RAG API integration...');

      try {
        const response = await fetch('https://fifedu.com/rag/api/v1/knowledge-base/get?pageSize=10', {
          headers: {
            'Authorization': token ? `Bearer ${token}` : '',
            'Content-Type': 'application/json'
          }
        });

        const data = await response.json();
        console.log('API Response:', data);

        document.getElementById('result').innerHTML = `
          <h3>✅ API 测试成功</h3>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        `;
      } catch (error) {
        console.error('API Error:', error);
        document.getElementById('result').innerHTML = `
          <h3>❌ API 测试失败</h3>
          <p>${error.message}</p>
        `;
      }
    }
  </script>
</head>
<body>
  <h1>知识库 API 集成测试</h1>
  <button onclick="testKnowledgeBaseAPI()">测试 API 调用</button>
  <div id="result"></div>
</body>
</html>
